name: enumd-ci

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env file
        run: touch .env.local

      - name: Graph fixtures
        run: npm run -s test:graph

      - name: Build graph artifacts
        run: npm run -s build:graph

      - name: Synthesis fixtures
        run: npm run -s test:synthesis

      - name: Build index
        run: npm run -s build-index

      - name: Stale advisory check
        run: npm run -s check-stale

      - name: Governance runtime mapping guard
        run: python scripts/validate-chatgpt-lane-ledger.py

  governance-check:
    name: Interception Ledger Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout ai-governance-framework submodule
        run: git submodule update --init --depth=1 ai-governance-framework

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run governance check (warn-only)
        env:
          PYTHONPATH: ${{ github.workspace }}/ai-governance-framework
        run: |
          python ai-governance-framework/governance_tools/ci_governance_check.py \
            --project-root . \
            --warn-only \
            --format human
