version: "1"
fail_mode: permissive
hook_coverage_tier: B

# Enumd is a Notion-to-Markdown extraction engine for AI governance pipelines.
# Python/JS project; no pytest runner configured locally — skip test artifact check.
skip_test_result_check: true
skip_type: temporary           # Python repo; pytest wirable; adoption not yet complete

blocking_actions:
  - production_fix_required

unknown_treatment:
  mode: block_if_count_exceeds
  threshold: 3

canonical_audit_trend:
  window_size: 20
  signal_threshold_ratio: 0.5
